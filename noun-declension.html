                            acc: neut ? A(n.nom) : A(stem+"um"), abl:A(stem+"ō") };
        pl = { nom: plOnly ? A(n.nom) : (neut ? A(stem+"a") : A(stem+"ī")),
               gen:A(plOnly ? n.gen : stem+"ōrum"), dat:A(stem+"īs"),
               acc: neut ? (plOnly ? A(n.nom) : A(stem+"a")) : A(stem+"ōs"), abl:A(stem+"īs") };
      } else if (n.decl === 3) {
        if (plOnly) {
          var gIum = /ium$/.test(stripM(n.gen));
          stem = gIum ? n.gen.slice(0,-3) : n.gen.slice(0,-2);
          pl = { nom:A(n.nom), gen:A(n.gen), dat:A(stem+"ibus"), acc:A(n.nom), abl:A(stem+"ibus") };
        } else {
          stem = n.gen.slice(0,-2);
          nIStem = neut && isNeuterIStem(n.nom);
          iStem = nIStem || isIStem(n.nom, stem);
          sg = { nom:A(n.nom), gen:A(n.gen), dat:A(stem+"ī"),
                 acc: neut ? A(n.nom) : A(stem+"em"),
                 abl: nIStem ? A(stem+"ī") : A(stem+"e") };
          pl = { nom: neut ? A(stem+(nIStem?"ia":"a")) : A(stem+"ēs"),
                 gen:A(stem+(iStem?"ium":"um")), dat:A(stem+"ibus"),
                 acc: neut ? A(stem+(nIStem?"ia":"a")) : A(stem+"ēs"), abl:A(stem+"ibus") };
        }
      } else if (n.decl === 4) {
        var neut4 = neut;  // genū, cornū
        stem = plOnly ? n.gen.slice(0,-3) : n.gen.slice(0,-2);
        if (!plOnly) sg = neut4
          ? { nom:A(n.nom), gen:A(n.gen), dat:A(stem+"ū"), acc:A(n.nom), abl:A(stem+"ū") }
          : { nom:A(n.nom), gen:A(n.gen), dat:A(stem+"uī"), acc:A(stem+"um"), abl:A(stem+"ū") };
        pl = neut4
          ? { nom:A(stem+"ua"), gen:A(stem+"uum"), dat:A(stem+"ibus"), acc:A(stem+"ua"), abl:A(stem+"ibus") }
          : { nom: plOnly ? A(n.nom) : A(stem+"ūs"), gen:A(plOnly ? n.gen : stem+"uum"),
              dat:A(stem+"ibus"), acc:A(stem+"ūs"), abl:A(stem+"ibus") };
      } else { // 5
        stem = n.gen.slice(0,-2);
        sg = { nom:A(n.nom), gen:A(n.gen), dat:A(n.gen), acc:A(stem+"em"), abl:A(stem+"ē") };
        pl = D5_WITH_PL.has(n.nom)
          ? { nom:A(stem+"ēs"), gen:A(stem+"ērum"), dat:A(stem+"ēbus"), acc:A(stem+"ēs"), abl:A(stem+"ēbus") }
          : null;
      }
      return { sg: sg, pl: pl };
    }

    function buildForms(n) {
      var f = buildRegular(n);
      var sp = SPECIAL[n.nom];
      if (sp) {
        ["sg","pl"].forEach(function(num) {
          if (!sp[num]) return;
          if (!f[num]) f[num] = { nom:null, gen:null, dat:null, acc:null, abl:null };
          CASES.forEach(function(cs) {
            if (sp[num].hasOwnProperty(cs)) f[num][cs] = sp[num][cs];
          });
        });
      }
      if (SG_ONLY.has(n.nom)) f.pl = null;
      if (isPlOnly(n)) f.sg = null;
      return f;
    }

    NOUNS.forEach(function(n) { n.forms = buildForms(n); });

    // Valid (case, number) cells for a noun given number mode and clue mode.
    // In Latin mode nom. sg. is skipped (prompt would equal the answer).
    function validCells(n, numberMode, latinMode) {
      var cells = [];
      NUMS.forEach(function(num) {
        if (numberMode === "sg" && num !== "sg") return;
        if (numberMode === "pl" && num !== "pl") return;
        if (!n.forms[num]) return;
        CASES.forEach(function(cs) {
          if (!n.forms[num][cs]) return;
          if (latinMode && cs === "nom" && num === "sg") return;
          cells.push({ cs: cs, num: num });
        });
      });
      return cells;
    }

    // ===== ENGLISH CLUES =====
    var EN_PL_IRREG = {
      "man":"men","woman":"women","child":"children","foot":"feet","tooth":"teeth",
      "ox":"oxen","mouse":"mice","goose":"geese","sheep":"sheep","fish":"fish",
      "deer":"deer","wife":"wives","knife":"knives","life":"lives","wolf":"wolves","as":"asses",
      "leaf":"leaves","thief":"thieves","calf":"calves","half":"halves","person":"people"
    };
    function enPluralWord(w) {
      if (EN_PL_IRREG[w]) return EN_PL_IRREG[w];
      if (/(s|sh|ch|x|z)$/.test(w)) return w + "es";
      if (/[^aeiou]y$/.test(w)) return w.slice(0,-1) + "ies";
      return w + "s";
    }
    function enPluralPhrase(phrase) {
      var w = phrase.split(" ");
      w[w.length-1] = enPluralWord(w[w.length-1]);
      return w.join(" ");
    }
    function enNoun(n, num) {
      var m = n.mng.replace(/^the\s+/, "");
      if (num === "pl" && !isPlOnly(n)) m = enPluralPhrase(m);
      return m;
    }
    function getEnglishPrompt(n, cs, num) {
      var w = enNoun(n, num);
      // If the English word is the same in both numbers (sheep, fish) and the
      // noun is drilled in both, tag the prompt with sg./pl.
      var tag = null;
      if (n.forms && n.forms.sg && n.forms.pl && enNoun(n, "sg") === enNoun(n, "pl")) {
        tag = (num === "sg" ? "sg." : "pl.");
      }
      var tagStr = tag ? " (" + tag + ")" : "";
      if (cs === "nom") return w + " (" + (tag ? tag + ", " : "") + "subject)";
      if (cs === "gen") return "of the " + w + tagStr;
      if (cs === "dat") return "for or to the " + w + tagStr;
      if (cs === "acc") return w + " (" + (tag ? tag + ", " : "") + "object)";
      return "from, with, in, or by the " + w + tagStr;
    }
  </script>

  <script>
    // Student name: URL parameter (works from file://) with localStorage fallback.
    var STUDENT = (function () {
      var p = null;
      try { p = new URLSearchParams(window.location.search).get("n"); } catch (e) {}
      if (p) {
        try { localStorage.setItem("exercitiaStudent", p); } catch (e) {}
        return p;
      }
      try { return localStorage.getItem("exercitiaStudent") || ""; } catch (e) { return ""; }
    })();
    (function () {
      var back = document.querySelector("a.back-link");
      if (back && STUDENT) back.href = "index.html?n=" + encodeURIComponent(STUDENT);
    })();
  </script>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    function normalize(s) {
      return stripM(s.trim().toLowerCase());
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function postToSheets(payload) {
      if (!SHEETS_WEBHOOK_URL) return;
      try {
        fetch(SHEETS_WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
      } catch (e) { /* silent fail */ }
    }

    const linkBtn = {
      background: "none", border: "none", color: "#a08850", cursor: "pointer",
      fontFamily: "'Cardo', 'Palatino Linotype', Palatino, Georgia, serif",
      fontSize: "0.85rem", padding: 0, textDecoration: "underline", textUnderlineOffset: "3px"
    };

    function App() {
      const studentName = STUDENT;

      const [selectedChapters, setSelectedChapters] = useState(new Set(ALL_CHAPTERS));
      const [selectedDecls, setSelectedDecls] = useState(new Set(ALL_DECLS));
      const [numberMode, setNumberMode] = useState("both"); // "sg", "pl", "both"
      const [englishMode, setEnglishMode] = useState(false);
      const [started, setStarted] = useState(false);
      const [queue, setQueue] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [input, setInput] = useState("");
      const [feedback, setFeedback] = useState(null);
      const [correctAnswer, setCorrectAnswer] = useState("");
      const [score, setScore] = useState({ correct: 0, wrong: 0 });
      const [showPrincipal, setShowPrincipal] = useState(false);
      const [totalQuestions, setTotalQuestions] = useState(20);
      const [missed, setMissed] = useState([]);
      const [mainLength, setMainLength] = useState(0);
      const [seenNouns, setSeenNouns] = useState(new Set());
      const [startTime, setStartTime] = useState(null);
      const [reported, setReported] = useState(false);
      const inputRef = useRef(null);

      const eligible = (n) =>
        selectedChapters.has(n.ch) &&
        selectedDecls.has(n.decl) &&
        validCells(n, numberMode, !englishMode).length > 0;

      const nounPool = NOUNS.filter(eligible);
      const totalInChapters = nounPool.length;
      const totalAvailable = nounPool.filter(n => !seenNouns.has(n.nom + "|" + n.gen)).length;

      useEffect(() => {
        if (started && inputRef.current) inputRef.current.focus();
      }, [started, currentIdx, feedback]);

      const startDrill = useCallback(() => {
        const filtered = NOUNS.filter(n => eligible(n) && !seenNouns.has(n.nom + "|" + n.gen));
        if (filtered.length === 0) return;
        const shuffled = shuffle(filtered);
        const count = Math.min(totalQuestions, shuffled.length);
        const items = shuffled.slice(0, count).map(noun => {
          const cells = validCells(noun, numberMode, !englishMode);
          const cell = cells[Math.floor(Math.random() * cells.length)];
          return { noun, cs: cell.cs, num: cell.num };
        });
        setSeenNouns(prev => {
          const next = new Set(prev);
          items.forEach(i => next.add(i.noun.nom + "|" + i.noun.gen));
          return next;
        });
        setQueue(items);
        setCurrentIdx(0);
        setInput("");
        setFeedback(null);
        setScore({ correct: 0, wrong: 0 });
        setMissed([]);
        setMainLength(items.length);
        setStarted(true);
        setShowPrincipal(false);
        setStartTime(Date.now());
        setReported(false);
      }, [selectedChapters, selectedDecls, totalQuestions, seenNouns, numberMode, englishMode]);

      const resetSession = () => {
        setSeenNouns(new Set());
        setStarted(false);
      };

      const logout = () => {
        try { localStorage.removeItem("exercitiaStudent"); } catch (e) {}
        window.location.href = "index.html";
      };

      const checkAnswer = () => {
        if (!input.trim()) return;
        const item = queue[currentIdx];
        const accepted = item.noun.forms[item.num][item.cs];
        const display = accepted.join(" / ");
        if (accepted.some(a => normalize(input) === normalize(a))) {
          setFeedback("correct");
          setScore(s => ({ ...s, correct: s.correct + 1 }));
          setCorrectAnswer(display);
        } else {
          setFeedback("wrong");
          setScore(s => ({ ...s, wrong: s.wrong + 1 }));
          setCorrectAnswer(display);
          setMissed(prev => [...prev, {
            noun: item.noun, cs: item.cs, num: item.num,
            wrongAnswer: input.trim(), correctForm: display
          }]);
          setQueue(prev => [...prev, { noun: item.noun, cs: item.cs, num: item.num, isRetry: true }]);
        }
      };

      const nextQuestion = () => {
        setCurrentIdx(i => i + 1);
        setInput("");
        setFeedback(null);
        setCorrectAnswer("");
        setShowPrincipal(false);
      };

      const toggleChapter = (ch) => {
        setSelectedChapters(prev => {
          const next = new Set(prev);
          if (next.has(ch)) next.delete(ch); else next.add(ch);
          return next;
        });
      };
      const toggleDecl = (d) => {
        setSelectedDecls(prev => {
          const next = new Set(prev);
          if (next.has(d)) next.delete(d); else next.add(d);
          return next;
        });
      };
      const selectAll = () => setSelectedChapters(new Set(ALL_CHAPTERS));
      const selectNone = () => setSelectedChapters(new Set());

      const done = currentIdx >= queue.length && started;

      useEffect(() => {
        if (done && !reported) {
          const elapsed = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;
          const pct = queue.length > 0 ? Math.round((score.correct / queue.length) * 100) : 0;
          const chapList = [...selectedChapters].sort((a,b) => a - b).join(", ");
          postToSheets({
            student: studentName.trim(),
            exercise: "Dēclīnātiōnēs Nōminum",
            numberMode: numberMode,
            declensions: [...selectedDecls].sort().join(", "),
            clueMode: englishMode ? "English" : "Latin",
            chapters: chapList,
            correct: score.correct,
            total: queue.length,
            percent: pct,
            timeSeconds: elapsed,
            missed: missed.map(m => ({
              noun: m.noun.nom,
              case_: m.cs,
              number: m.num,
              wrong: m.wrongAnswer,
              correct: m.correctForm
            }))
          });
          setReported(true);
        }
      }, [done]);

      const item = queue[currentIdx];

      if (!studentName) {
        window.location.href = "index.html";
        return null;
      }

      // ====== SETUP SCREEN ======
      if (!started) {
        return (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "1.5rem" }}>
              <h1 style={{
                fontSize: "1.6rem", fontWeight: 400, letterSpacing: "0.12em",
                textTransform: "uppercase", borderBottom: "none",
                color: "#c9b97a", margin: 0
              }}>
                Dēclīnātiōnēs Nōminum
              </h1>
              <div style={{ fontSize: "0.8rem", color: "#888" }}>
                <span style={{ marginRight: "0.75rem" }}>{studentName}</span>
                <button onClick={logout} style={{ ...linkBtn, fontSize: "0.75rem" }}>ēxī</button>
              </div>
            </div>
            <div style={{ borderBottom: "1px solid #555", marginBottom: "1.5rem" }}></div>

            <p style={{ fontSize: "0.95rem", lineHeight: 1.7, marginBottom: "1.5rem", color: "#b0ab9a" }}>
              Capitula et dēclīnātiōnēs sēlige et numerum quaestiōnum statue.
            </p>

            <div style={{ marginBottom: "1.25rem" }}>
              <div style={{ display: "flex", gap: "0.75rem", marginBottom: "0.75rem" }}>
                <button onClick={selectAll} style={linkBtn}>Omnia</button>
                <button onClick={selectNone} style={linkBtn}>Nūlla</button>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "0.5rem" }}>
                {ALL_CHAPTERS.map(ch => (
                  <button key={ch} onClick={() => toggleChapter(ch)} style={{
                    padding: "0.25rem 0.6rem", fontSize: "0.8rem",
                    border: selectedChapters.has(ch) ? "1px solid #c9b97a" : "1px solid #444",
                    background: selectedChapters.has(ch) ? "#2a2824" : "transparent",
                    color: selectedChapters.has(ch) ? "#c9b97a" : "#777",
                    cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s"
                  }}>
                    {ch}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: "1.1rem" }}>
              <p style={{ fontSize: "0.85rem", color: "#888", marginBottom: "0.5rem" }}>Dēclīnātiō:</p>
              <div style={{ display: "flex", gap: "0.5rem" }}>
                {ALL_DECLS.map(d => (
                  <button key={d} onClick={() => toggleDecl(d)} style={{
                    padding: "0.35rem 0.9rem", fontSize: "0.85rem",
                    border: selectedDecls.has(d) ? "1px solid #c9b97a" : "1px solid #444",
                    background: selectedDecls.has(d) ? "#2a2824" : "transparent",
                    color: selectedDecls.has(d) ? "#c9b97a" : "#777",
                    cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s"
                  }}>
                    {["I","II","III","IV","V"][d - 1]}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: "1.5rem" }}>
              <label style={{ fontSize: "0.85rem", color: "#888" }}>
                Numerus quaestiōnum:&nbsp;
                <select value={totalQuestions} onChange={e => setTotalQuestions(Number(e.target.value))} style={{
                  background: "#2a2824", color: "#e8e4d9", border: "1px solid #555",
                  padding: "0.3rem 0.5rem", fontFamily: "inherit", fontSize: "0.85rem"
                }}>
                  {[10, 20, 30, 50].map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </label>
            </div>

            <div style={{ marginBottom: "1.1rem" }}>
              <p style={{ fontSize: "0.85rem", color: "#888", marginBottom: "0.5rem" }}>Numerus:</p>
              <div style={{ display: "flex", gap: "0.5rem" }}>
                {[
                  { val: "sg", label: "Singulāris" },
                  { val: "pl", label: "Plūrālis" },
                  { val: "both", label: "Uterque" }
                ].map(opt => (
                  <button key={opt.val} onClick={() => setNumberMode(opt.val)} style={{
                    padding: "0.35rem 0.9rem", fontSize: "0.85rem",
                    border: numberMode === opt.val ? "1px solid #c9b97a" : "1px solid #444",
                    background: numberMode === opt.val ? "#2a2824" : "transparent",
                    color: numberMode === opt.val ? "#c9b97a" : "#777",
                    cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s"
                  }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: "1.1rem" }}>
              <p style={{ fontSize: "0.85rem", color: "#888", marginBottom: "0.5rem" }}>Modus:</p>
              <div style={{ display: "flex", gap: "0.5rem" }}>
                <button onClick={() => setEnglishMode(false)} style={{
                  padding: "0.35rem 0.9rem", fontSize: "0.85rem",
                  border: !englishMode ? "1px solid #c9b97a" : "1px solid #444",
                  background: !englishMode ? "#2a2824" : "transparent",
                  color: !englishMode ? "#c9b97a" : "#777",
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s"
                }}>
                  Latīnē
                </button>
                <button onClick={() => setEnglishMode(true)} style={{
                  padding: "0.35rem 0.9rem", fontSize: "0.85rem",
                  border: englishMode ? "1px solid #c9b97a" : "1px solid #444",
                  background: englishMode ? "#2a2824" : "transparent",
                  color: englishMode ? "#c9b97a" : "#777",
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s"
                }}>
                  Anglicē
                </button>
              </div>
            </div>

            <div style={{ marginBottom: "1.5rem", fontSize: "0.85rem", color: "#888" }}>
              <span>Nōmina restantia: <strong style={{ color: totalAvailable > 0 ? "#c9b97a" : "#b56b6b" }}>{totalAvailable}</strong> / {totalInChapters}</span>
            </div>

            {totalAvailable === 0 && (
              <p style={{ fontSize: "0.9rem", color: "#b56b6b", marginBottom: "1rem" }}>
                Omnia nōmina iam vīsa sunt.
              </p>
            )}

            <div style={{ display: "flex", gap: "0.75rem" }}>
              <button onClick={startDrill} disabled={totalAvailable === 0} style={{
                padding: "0.6rem 1.8rem", fontSize: "1rem",
                background: totalAvailable === 0 ? "#333" : "#c9b97a",
                color: totalAvailable === 0 ? "#666" : "#1a1a1e",
                border: "none", cursor: totalAvailable === 0 ? "default" : "pointer",
                fontFamily: "inherit", fontWeight: 600, letterSpacing: "0.06em"
              }}>
                Incipe
              </button>
              {totalAvailable === 0 && (
                <button onClick={resetSession} style={{
                  padding: "0.6rem 1.8rem", fontSize: "1rem",
                  background: "#c9b97a", color: "#1a1a1e",
                  border: "none", cursor: "pointer",
                  fontFamily: "inherit", fontWeight: 600, letterSpacing: "0.06em"
                }}>
                  Nova sessiō
                </button>
              )}
            </div>
          </div>
        );
      }

      // ====== RESULTS ======
      if (done) {
        const elapsed = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        return (
          <div>
            <h1 style={{
              fontSize: "1.6rem", fontWeight: 400, letterSpacing: "0.12em",
              textTransform: "uppercase", borderBottom: "1px solid #555",
              paddingBottom: "0.75rem", marginBottom: "1.5rem", color: "#c9b97a"
            }}>
              Dēclīnātiōnēs Nōminum
            </h1>
            <h2 style={{ fontSize: "1.2rem", fontWeight: 400, color: "#c9b97a", marginBottom: "1rem" }}>Fīnis</h2>
            <p style={{ fontSize: "0.85rem", color: "#888", marginBottom: "0.75rem" }}>{studentName}</p>
            <p style={{ fontSize: "1.1rem", lineHeight: 1.8 }}>
              Rēcta: <span style={{ color: "#7a9e7a" }}>{score.correct}</span> &nbsp;/&nbsp; Falsa: <span style={{ color: "#b56b6b" }}>{score.wrong}</span>
            </p>
            <div style={{ display: "flex", alignItems: "center", gap: "1.25rem", margin: "0.75rem 0" }}>
              {(() => {
                const pct = queue.length > 0 ? Math.round((score.correct / queue.length) * 100) : 0;
                const r = 34, c = 2 * Math.PI * r;
                const col = pct >= 80 ? "#7a9e7a" : pct >= 50 ? "#c9b97a" : "#b56b6b";
                return (
                  <svg width="84" height="84" viewBox="0 0 84 84">
                    <circle cx="42" cy="42" r={r} fill="none" stroke="#333" strokeWidth="6" />
                    <circle cx="42" cy="42" r={r} fill="none" stroke={col} strokeWidth="6"
                      strokeDasharray={c} strokeDashoffset={c * (1 - pct / 100)}
                      strokeLinecap="round" transform="rotate(-90 42 42)" />
                    <text x="42" y="48" textAnchor="middle" fontSize="17" fill="#e8e4d9" fontFamily="inherit">{pct}%</text>
                  </svg>
                );
              })()}
              <span style={{ fontSize: "0.85rem", color: "#666" }}>
                {mins > 0 ? mins + " min " : ""}{secs} s
              </span>
            </div>

            {missed.length > 0 && (
              <div style={{ marginTop: "1.5rem" }}>
                <h3 style={{
                  fontSize: "1rem", fontWeight: 400, color: "#a08850",
                  marginBottom: "0.75rem", borderBottom: "1px solid #3a3a3e", paddingBottom: "0.5rem"
                }}>
                  Nōmina corrigenda
                </h3>
                <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>
                  {missed.map((m, i) => (
                    <div key={i} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "baseline",
                      padding: "0.5rem 0.75rem", background: "#222226",
                      border: "1px solid #3a3a3e", fontSize: "0.9rem"
                    }}>
                      <div>
                        <span style={{ color: "#c9b97a" }}>{m.noun.nom}</span>
                        <span style={{ color: "#666", marginLeft: "0.5rem" }}>
                          ({CASE_LABELS[m.cs]} {NUM_LABELS[m.num]})
                        </span>
                      </div>
                      <div>
                        <span style={{ color: "#b56b6b", marginRight: "0.75rem" }}>{m.wrongAnswer}</span>
                        <span style={{ color: "#7a9e7a" }}>{m.correctForm}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div style={{ marginTop: "1.5rem", display: "flex", gap: "1rem" }}>
              <button onClick={() => setStarted(false)} style={{
                padding: "0.5rem 1.4rem", background: "#c9b97a", color: "#1a1a1e",
                border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: "0.95rem", fontWeight: 600
              }}>
                Iterum
              </button>
              <button onClick={resetSession} style={{
                padding: "0.5rem 1.4rem", background: "transparent", color: "#a08850",
                border: "1px solid #a08850", cursor: "pointer", fontFamily: "inherit", fontSize: "0.95rem"
              }}>
                Nova sessiō
              </button>
            </div>
          </div>
        );
      }

      // ====== DRILL ======
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "0.5rem" }}>
            <h1 style={{
              fontSize: "1.4rem", fontWeight: 400, letterSpacing: "0.12em",
              textTransform: "uppercase", color: "#c9b97a", margin: 0
            }}>
              Dēclīnātiōnēs Nōminum
            </h1>
            <span style={{ fontSize: "0.8rem", color: "#666" }}>{studentName}</span>
          </div>
          <div style={{ borderBottom: "1px solid #555", marginBottom: "1.25rem" }}></div>

          <div className="progress-track"><div className="progress-fill" style={{ width: (queue.length ? (currentIdx / queue.length) * 100 : 0) + "%" }}></div></div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.8rem", color: "#777", marginBottom: "1.5rem" }}>
            <span>
              {currentIdx + 1} / {queue.length}
              {currentIdx >= mainLength && <span style={{ color: "#a08850", marginLeft: "0.5rem" }}>(iterātiō)</span>}
            </span>
            <span style={{ color: "#7a9e7a" }}>{score.correct} recta</span>
          </div>

          <div style={{
            background: "#222226", border: "1px solid #3a3a3e",
            padding: "1.5rem", marginBottom: "1.25rem"
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "0.5rem" }}>
              <p style={{ fontSize: "0.8rem", color: "#888", margin: 0 }}>
                Cap. {item.noun.ch}
              </p>
              <div style={{ textAlign: "right" }}>
                {isPlOnly(item.noun) && (
                  <div style={{ fontSize: "0.65rem", color: "#b56b6b", letterSpacing: "0.06em",
                    padding: "0.15rem 0.5rem", border: "1px solid #b56b6b", display: "inline-block" }}>
                    PLŪRĀLE TANTUM
                  </div>
                )}
              </div>
            </div>
            {englishMode ? (
              <p style={{ fontSize: "1.5rem", marginBottom: "0.75rem", marginTop: 0 }}>
                <span style={{ color: "#c9b97a" }}>{getEnglishPrompt(item.noun, item.cs, item.num)}</span>
                <span style={{ fontSize: "0.85rem", color: "#888", marginLeft: "0.75rem" }}>({item.noun.nom})</span>
              </p>
            ) : (
              <div>
                <p style={{ fontSize: "1.5rem", marginBottom: "0.75rem", marginTop: 0 }}>
                  <span style={{ color: "#c9b97a" }}>{item.noun.nom}</span>
                  <span style={{ fontSize: "0.85rem", color: "#888", marginLeft: "0.75rem" }}>({item.noun.mng})</span>
                </p>
                <p style={{ fontSize: "1.1rem", marginBottom: 0, marginTop: 0 }}>
                  Cāsus: <strong style={{ color: "#ddd" }}>
                    {CASE_LABELS[item.cs]} {NUM_LABELS[item.num]}
                  </strong>
                </p>
              </div>
            )}
          </div>

          {!feedback && (
            <button onClick={() => setShowPrincipal(!showPrincipal)} style={{
              ...linkBtn, fontSize: "0.8rem", marginBottom: "1rem", display: "block"
            }}>
              {showPrincipal ? "Cēla fōrmās prīncipālēs" : "Ostende fōrmās prīncipālēs"}
            </button>
          )}
          {showPrincipal && !feedback && (
            <p style={{ fontSize: "0.9rem", color: "#a08850", marginBottom: "1rem" }}>
              <strong>{item.noun.nom}, {item.noun.gen} <em>{item.noun.g}</em></strong>
            </p>
          )}

          <div style={{ display: "flex", gap: "0.75rem", alignItems: "center" }}>
            <input
              ref={inputRef}
              type="text"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === "Enter") {
                  if (feedback) nextQuestion(); else checkAnswer();
                }
              }}
              readOnly={!!feedback}
              placeholder="Scrībe fōrmam..."
              style={{
                flex: 1, padding: "0.6rem 0.75rem", fontSize: "1.1rem",
                fontFamily: "inherit", background: "#2a2824", color: "#e8e4d9",
                border: feedback === "correct" ? "1px solid #7a9e7a"
                  : feedback === "wrong" ? "1px solid #b56b6b" : "1px solid #555",
                outline: "none"
              }}
            />
            {!feedback ? (
              <button onClick={checkAnswer} style={{
                padding: "0.6rem 1.2rem", fontSize: "0.95rem",
                background: "#c9b97a", color: "#1a1a1e", border: "none",
                cursor: "pointer", fontFamily: "inherit", fontWeight: 600
              }}>
                Proba
              </button>
            ) : (
              <button onClick={nextQuestion} style={{
                padding: "0.6rem 1.2rem", fontSize: "0.95rem",
                background: "#555", color: "#e8e4d9", border: "none",
                cursor: "pointer", fontFamily: "inherit"
              }}>
                Proxima
              </button>
            )}
          </div>

          {feedback && (
            <div className={feedback === "correct" ? "fb-ok" : "fb-no"} style={{
              marginTop: "1rem", padding: "0.75rem 1rem",
              background: feedback === "correct" ? "rgba(122,158,122,0.12)" : "rgba(181,107,107,0.12)",
              border: feedback === "correct" ? "1px solid #4a6e4a" : "1px solid #7a4444"
            }}>
              {feedback === "correct" ? (
                <p style={{ margin: 0, color: "#7a9e7a" }}>Rēctē. <strong>{correctAnswer}</strong></p>
              ) : (
                <p style={{ margin: 0, color: "#b56b6b" }}>
                  Falsum. Rēspōnsum rēctum: <strong style={{ color: "#e8e4d9" }}>{correctAnswer}</strong>
                </p>
              )}
            </div>
          )}

          <p style={{ fontSize: "0.7rem", color: "#555", marginTop: "1.5rem" }}>
            Macrōna nōn requīruntur. Enter = proba / proxima.
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
